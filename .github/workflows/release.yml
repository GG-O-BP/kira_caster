name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - run: gleam deps download

      - name: Fix rebar3 cp same-file issue (esqlite pc plugin)
        if: runner.os != 'Windows'
        run: |
          mkdir -p /tmp/bin_override
          cat > /tmp/bin_override/cp << 'EOF'
          #!/bin/bash
          /bin/cp "$@" 2>/tmp/cp_err_last
          RC=$?
          if [ $RC -ne 0 ] && grep -q "are the same file" /tmp/cp_err_last; then
            exit 0
          fi
          cat /tmp/cp_err_last >&2
          exit $RC
          EOF
          chmod +x /tmp/bin_override/cp
          echo "/tmp/bin_override" >> "$GITHUB_PATH"

      - name: Export Erlang shipment
        run: gleam export erlang-shipment

      - name: Package release with bundled ERTS
        if: runner.os != 'Windows'
        run: bash scripts/package_release.sh "${{ matrix.target }}"

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/package_release.sh "${{ matrix.target }}"

      - name: Build macOS .dmg
        if: runner.os == 'macOS'
        run: bash scripts/build_macos_app.sh "kira_caster-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        if: runner.os != 'macOS'
        with:
          name: kira_caster-${{ matrix.target }}
          path: kira_caster-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: kira_caster-${{ matrix.target }}
          path: |
            kira_caster-${{ matrix.target }}.tar.gz
            kira_caster-${{ matrix.target }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.dmg
          generate_release_notes: true
          body: |
            ## 설치 방법

            ### macOS
            `.dmg` 파일을 다운로드하고 더블클릭하세요. `kira_caster.app`을 실행하면 브라우저가 자동으로 열립니다.

            ### Linux
            1. `.tar.gz` 파일을 다운로드하고 압축을 풀어주세요
            2. `start.sh`를 더블클릭하거나 `kira-caster.desktop` 파일을 사용하세요
            3. 브라우저가 자동으로 열립니다

            ### Windows
            1. `.tar.gz` 파일을 다운로드하고 압축을 풀어주세요
            2. `start.bat`을 더블클릭하세요
            3. 브라우저가 자동으로 열립니다

            ### Docker
            ```sh
            bash scripts/docker-start.sh
            ```

            > 모든 플랫폼에서 Erlang 런타임이 포함되어 있어 별도 설치가 필요 없습니다.
            > 처음 실행하면 설정 마법사가 나타납니다.
