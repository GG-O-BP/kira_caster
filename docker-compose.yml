services:
  kira_caster:
    build: .
    ports:
      - "${KIRA_ADMIN_PORT:-9693}:9693"
    volumes:
      - kira_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9693/status"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  kira_data:
